<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Certification Roadmap</title>
<style>
:root{--bg:#0a0c12;--surface:#13151f;--border:#2a2d3d;--text:#f0f2ff;--muted:#8892b0;--accent:#818cf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 12px;}
h1{font-size:1.3rem;font-weight:700;letter-spacing:.05em;margin-bottom:2px;color:#e8eeff;}
.tagline{font-size:.68rem;color:var(--muted);margin-bottom:12px;text-align:center;}

.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:10px;}
.tab{padding:7px 15px;font-size:.68rem;font-weight:700;letter-spacing:.04em;cursor:pointer;border:none;
  background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap;}
.tab+.tab{border-left:1px solid var(--border);}
.tab.active{background:var(--accent);color:#fff;}

.legend-bar{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;margin-bottom:10px;
  font-size:.62rem;color:#c0c8e8;min-height:14px;}
.legend-bar span{display:flex;align-items:center;gap:4px;}
.sw{display:inline-block;width:18px;height:3px;border-radius:2px;flex-shrink:0;}

.domain-filters{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:10px;max-width:960px;}
.dfbtn{background:var(--surface);border:1px solid var(--border);color:#a0aac8;border-radius:4px;
  padding:3px 9px;font-size:.64rem;font-weight:600;cursor:pointer;transition:all .15s;}
.dfbtn:hover,.dfbtn.active{border-color:var(--accent);color:#fff;}
.dfbtn.active{background:#1e2040;}

#wheel-wrap{position:relative;width:min(880px,96vw);aspect-ratio:1;}
svg#wheel{width:100%;height:100%;overflow:visible;}

#bar-wrap{width:min(840px,96vw);display:none;}
.bar-scale{display:flex;flex-wrap:wrap;gap:5px 14px;justify-content:center;margin-bottom:12px;
  padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;}
.bar-scale-item{display:flex;align-items:center;gap:7px;font-size:.61rem;color:#c0c8e8;}
.bar-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.7rem;color:#fff;flex-shrink:0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;cursor:pointer;}
.bar-row:hover .bar-fill{filter:brightness(1.2);}
.bar-label{font-size:.71rem;font-weight:700;width:120px;flex-shrink:0;text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:#1a1d2e;border-radius:3px;height:20px;position:relative;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.bar-score{position:absolute;right:7px;top:50%;transform:translateY(-50%);
  font-size:.65rem;font-weight:800;color:#fff;}
.bar-tags{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;max-width:140px;}
.bar-tag{font-size:.5rem;padding:1px 4px;border-radius:2px;font-weight:700;white-space:nowrap;}

#scatter-wrap{width:min(840px,96vw);display:none;flex-direction:column;align-items:center;}
.scatter-legend{display:flex;gap:6px 14px;flex-wrap:wrap;justify-content:center;
  margin-bottom:8px;font-size:.62rem;color:#c0c8e8;}
.scatter-legend span{display:flex;align-items:center;gap:5px;}
.sdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}

#tooltip{position:fixed;background:#1a1d2e;border:1px solid #3a3d54;border-radius:7px;
  padding:9px 13px;font-size:.69rem;line-height:1.55;pointer-events:none;opacity:0;
  transition:opacity .1s;z-index:9999;max-width:300px;}
#tooltip.vis{opacity:1;}
.tt-ctx{font-size:.59rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.tt-name{font-weight:800;color:#fff;margin-top:2px;font-size:.82rem;}
.tt-sub{color:#b0bcdc;font-size:.65rem;margin-top:1px;}
.tt-cost{color:#818cf8;font-size:.65rem;margin-top:3px;}
.tt-scores{margin-top:5px;display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:.63rem;}
.tt-sl{color:var(--muted);}
.tt-sv{display:flex;align-items:center;gap:3px;}
.pip{width:7px;height:7px;border-radius:50%;display:inline-block;}
.tt-verdict{margin-top:5px;font-size:.63rem;color:#d0d8f8;line-height:1.5;
  border-top:1px solid #252840;padding-top:5px;}

#cert-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9998;
  opacity:0;pointer-events:none;transition:opacity .18s;}
#cert-overlay.vis{opacity:1;pointer-events:all;}
#cert-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.93);
  background:#13151f;border:1px solid #3a3f5c;border-radius:10px;padding:20px 22px;
  z-index:9999;max-width:320px;width:90vw;opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;}
#cert-card.vis{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
#cert-card .cc-ctx{font-size:.59rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
#cert-card .cc-name{font-size:1.05rem;font-weight:800;margin:4px 0 2px;}
#cert-card .cc-badge{display:inline-block;font-size:.54rem;font-weight:700;padding:2px 6px;
  border-radius:3px;background:#ff4466;color:#fff;margin-left:5px;vertical-align:middle;}
#cert-card .cc-full{font-size:.68rem;color:#a8b4d0;margin-bottom:6px;}
#cert-card .cc-cost{font-size:.73rem;font-weight:700;color:#818cf8;margin-bottom:10px;}
#cert-card .cc-scores{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;
  font-size:.64rem;margin-bottom:10px;}
#cert-card .cc-sl{color:var(--muted);}
#cert-card .cc-sv{display:flex;align-items:center;gap:3px;}
#cert-card .cc-verdict{font-size:.65rem;color:#c8d4f0;line-height:1.55;
  border-top:1px solid #252840;padding-top:9px;margin-bottom:14px;}
#cert-card .cc-actions{display:flex;gap:8px;}
#cert-card .cc-visit{flex:1;padding:8px;background:#818cf8;color:#fff;border:none;
  border-radius:6px;font-size:.71rem;font-weight:700;cursor:pointer;transition:background .15s;}
#cert-card .cc-visit:hover{background:#6366f1;}
#cert-card .cc-close{padding:8px 14px;background:transparent;color:var(--muted);
  border:1px solid #2a2d3d;border-radius:6px;font-size:.71rem;font-weight:700;
  cursor:pointer;transition:all .15s;}
#cert-card .cc-close:hover{border-color:#818cf8;color:#fff;}

.footnote{font-size:.62rem;color:var(--muted);margin-top:12px;text-align:center;
  max-width:740px;line-height:1.65;}
</style>
</head>

<p class="tagline">Third-party · vendor-neutral only · no vendor-specific certs · center = rarest · outer = foundational · ⚔ = offensive</p>

<div class="tabs">

<div id="bar-wrap"></div>
<div id="scatter-wrap">

<div id="cert-overlay"></div>

</div>
<div id="tooltip"></div>
<p class="footnote" id="footnote">Third-party, vendor-neutral certifications only. Vendor-specific certs (AWS, Azure, GCP, etc.) are intentionally excluded.</p>

const SVG_NS='http://www.w3.org/2000/svg';

const N=DOMAINS.length;
const GAP=0.022;

function domAngle(i){return -Math.PI/2+(2*Math.PI*i)/N;}
function polar(r,a){return[r*Math.cos(a),r*Math.sin(a)];}

function arcPath(r1,r2,aS,aE){
  const[x1,y1]=polar(r2,aS),[x2,y2]=polar(r2,aE),[x3,y3]=polar(r1,aE),[x4,y4]=polar(r1,aS);
  const lg=(aE-aS)>Math.PI?1:0;
  return`M${x1} ${y1}A${r2} ${r2} 0 ${lg} 1 ${x2} ${y2}L${x3} ${y3}A${r1} ${r1} 0 ${lg} 0 ${x4} ${y4}Z`;
}

function scoreColor(s){
  const t=(s-1)/4;
  const r=Math.round(180-t*130),g=Math.round(40+t*175),b=Math.round(60+t*40);
  return`rgb(${r},${g},${b})`;
}

  R_RINGS.forEach((r,i)=>{

  TIERS.forEach((tier,i)=>{

  const defsD=document.createElementNS(SVG_NS,'defs');
  degLabels.forEach(({ringIdx,label,tierIdx})=>{
    const r=R_RINGS[ringIdx];
    const col=TIERS[tierIdx].color;
    const pid=`deg-arc-${ringIdx}`;
    const p=document.createElementNS(SVG_NS,'path');
    p.id=pid;
    p.setAttribute('d',`M ${-r} 0 A ${r} ${r} 0 0 0 ${r} 0`);
    defsD.appendChild(p);
    const dt=document.createElementNS(SVG_NS,'text');
    dt.setAttribute('font-size','6.5');dt.setAttribute('font-weight','700');
    dt.setAttribute('fill',col);dt.setAttribute('opacity','0.6');

    svg.appendChild(dt);
  });
  svg.insertBefore(defsD,svg.firstChild);

  DOMAINS.forEach((d,i)=>{
    const aS=domAngle(i)+GAP/2,aE=domAngle(i+1)-GAP/2;
    const bg=document.createElementNS(SVG_NS,'path');
    bg.setAttribute('d',arcPath(R_INNER,R_RINGS[5],aS,aE));

    svg.appendChild(bg);

    const aMid=(aS+aE)/2;
    const[lx,ly]=polar(R_RINGS[5]+26,aMid);
    const ang=aMid*180/Math.PI+90,flip=lx<-5?180:0;

    const[sx,sy]=polar(R_RINGS[5]+16,aS-GAP/2);

    sp.setAttribute('stroke','#0a0c12');sp.setAttribute('stroke-width','1.5');
    svg.appendChild(sp);

  const cc=document.createElementNS(SVG_NS,'circle');
  cc.setAttribute('cx',0);cc.setAttribute('cy',0);cc.setAttribute('r',R_INNER);

  const HR1=R_RINGS[5]+70,HR2=R_RINGS[5]+102,HM=(HR1+HR2)/2;
  const halo=document.createElementNS(SVG_NS,'circle');
  halo.setAttribute('cx',0);halo.setAttribute('cy',0);halo.setAttribute('r',HM);

  [{r:HR1,op:'0.25'},{r:HR2,op:'0.4'}].forEach(({r,op})=>{
    const c=document.createElementNS(SVG_NS,'circle');
    c.setAttribute('cx',0);c.setAttribute('cy',0);c.setAttribute('r',r);

    c.setAttribute('stroke-width','1');c.setAttribute('stroke-opacity',op);

  const hDefs=document.createElementNS(SVG_NS,'defs');

// ── PLACE CERT NODES ─────────────────────────────────────────────────────────
function placeCerts(list){
  svg.querySelectorAll('.cert-node').forEach(n=>n.remove());
  const counters={},totals={};
  DOMAINS.forEach(d=>{for(let l=1;l<=5;l++)counters[`${d.key}-${l}`]=0;});
  list.forEach(c=>{const k=`${c.domain}-${c.level}`;totals[k]=(totals[k]||0)+1;});

  list.forEach(cert=>{
    const di=DOMAINS.findIndex(d=>d.key===cert.domain);
    if(di===-1)return;
    const d=DOMAINS[di],lvl=cert.level;
    const invLvl=6-lvl;
    const k=`${cert.domain}-${lvl}`;
    const si=counters[k]++,total=totals[k]||1;
    const aS=domAngle(di)+GAP/2,aE=domAngle(di+1)-GAP/2,aSpan=aE-aS;
    const step=aSpan/(total+1),nodeAngle=aS+step*(si+1);
    const r1=R_RINGS[invLvl-1]+4,r2=R_RINGS[invLvl]-4,nodeR=(r1+r2)/2;
    const[nx,ny]=polar(nodeR,nodeAngle);
    const maxW=Math.min(aSpan*nodeR*0.88,36),h=cert.red?13:11;

    const g=document.createElementNS(SVG_NS,'g');
    g.setAttribute('class','cert-node');
    g.setAttribute('transform',`translate(${nx.toFixed(1)},${ny.toFixed(1)})`);
    g.style.opacity='0';g.style.transition='opacity 0.3s ease';
    g.setAttribute('cursor','pointer');

    const rect=document.createElementNS(SVG_NS,'rect');
    rect.setAttribute('x',-(maxW/2));rect.setAttribute('y',-(h/2));
    rect.setAttribute('width',maxW);rect.setAttribute('height',h);rect.setAttribute('rx',3);
    rect.setAttribute('fill',d.color);rect.setAttribute('fill-opacity','0.82');
    rect.setAttribute('stroke',d.color);rect.setAttribute('stroke-width','1');
    rect.setAttribute('stroke-opacity','1');

    const label=cert.red?`⚔${cert.name}`:cert.name;
    const txt=document.createElementNS(SVG_NS,'text');
    txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');
    txt.setAttribute('fill','#050710');
    txt.setAttribute('font-size',Math.min(6.2,maxW/(label.length+0.5)*1.1).toFixed(1));
    txt.setAttribute('font-weight','800');txt.setAttribute('pointer-events','none');
    txt.textContent=label;

    g.appendChild(rect);g.appendChild(txt);
    g.addEventListener('mouseenter',e=>showCertTip(e,cert,d));
    g.addEventListener('mousemove',moveTooltip);
    g.addEventListener('mouseleave',hideTooltip);
    g.addEventListener('click',()=>openCertCard(cert,d));
    svg.appendChild(g);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{g.style.opacity='1';}));
  });
}

// ── CERT CARD ────────────────────────────────────────────────────────────────
function openCertCard(cert,domain){
  hideTooltip();
  const tier=TIERS[cert.level-1];
  document.getElementById('cc-ctx').textContent=`${domain.short} · ${tier.name}`;
  const nameEl=document.getElementById('cc-name');
  nameEl.style.color=domain.color;
  nameEl.innerHTML=cert.name+(cert.red?'<span class="cc-badge">⚔ Offensive</span>':'');
  document.getElementById('cc-full').textContent=cert.full;
  document.getElementById('cc-cost').textContent=cert.cost;
  document.getElementById('cc-scores').innerHTML=
    `<span class="cc-sl">Training</span><span class="cc-sv">${pips(cert.sent.t)}</span>`+
    `<span class="cc-sl">HR value</span><span class="cc-sv">${pips(cert.sent.e)}</span>`+
    `<span class="cc-sl">Community</span><span class="cc-sv">${pips(cert.sent.c)}</span>`;
  document.getElementById('cc-verdict').textContent=cert.verdict;
  document.getElementById('cc-visit').onclick=()=>window.open(cert.url,'_blank');
  document.getElementById('cert-card').classList.add('vis');
  document.getElementById('cert-overlay').classList.add('vis');
}
function closeCertCard(){
  document.getElementById('cert-card').classList.remove('vis');
  document.getElementById('cert-overlay').classList.remove('vis');
}
document.getElementById('cc-close').addEventListener('click',closeCertCard);
document.getElementById('cert-overlay').addEventListener('click',closeCertCard);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCertCard();});

// ── BAR CHART ────────────────────────────────────────────────────────────────
function renderBars(orgs){
  const wrap=document.getElementById('bar-wrap');
  wrap.innerHTML='';
  const scale=document.createElement('div');scale.className='bar-scale';
  [[5,'rgb(40,215,100)','Exceptional — lab-heavy, produces capable professionals'],
   [4,'rgb(40,175,95)', 'Strong — high quality with a meaningful caveat'],
   [3,'rgb(120,120,120)','Adequate — functional prep, limited skill transfer'],
   [2,'rgb(175,90,40)', 'Weak — rarely produces capable practitioners'],
   [1,'rgb(180,40,60)', 'Poor — memorization-focused or counterproductive'],
  ].forEach(([n,col,label])=>{
    const item=document.createElement('div');item.className='bar-scale-item';
    item.innerHTML=`<div class="bar-circle" style="background:${col}">${n}</div>${label}`;
    scale.appendChild(item);
  });
  wrap.appendChild(scale);

  [...orgs].sort((a,b)=>b.scores.t-a.scores.t).forEach(org=>{
    const col=ORG_COLORS[org.id]||'#888';
    const row=document.createElement('div');row.className='bar-row';
    const lbl=document.createElement('div');lbl.className='bar-label';lbl.style.color=col;lbl.textContent=org.name;
    const track=document.createElement('div');track.className='bar-track';
    const fill=document.createElement('div');fill.className='bar-fill';fill.style.background=col;fill.style.width='0';
    const sc=document.createElement('div');sc.className='bar-score';sc.textContent=org.scores.t+'/5';
    track.appendChild(fill);track.appendChild(sc);
    const tags=document.createElement('div');tags.className='bar-tags';
    org.domains.forEach(dk=>{
      const dm=DOMAINS.find(d=>d.key===dk);if(!dm)return;
      const tag=document.createElement('span');tag.className='bar-tag';
      tag.style.cssText=`border:1px solid ${dm.color};color:${dm.color};`;tag.textContent=dm.short;
      tags.appendChild(tag);
    });
    row.appendChild(lbl);row.appendChild(track);row.appendChild(tags);
    row.addEventListener('mouseenter',e=>showOrgTip(e,org,'training'));
    row.addEventListener('mousemove',moveTooltip);row.addEventListener('mouseleave',hideTooltip);
    row.addEventListener('click',()=>window.open(org.url,'_blank'));
    wrap.appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{fill.style.width=(org.scores.t/5*100)+'%';}));
  });
}

// ── SCATTER ──────────────────────────────────────────────────────────────────
function el(tag,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;
}
function tx(text,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg','text');
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));e.textContent=text;return e;
}

function renderScatter(orgs){
  const sc=document.getElementById('scatter');sc.innerHTML='';
  const leg=document.getElementById('scatter-legend');leg.innerHTML='';
  const P={l:52,r:20,t:30,b:52};
  const W=580,H=470,PW=W-P.l-P.r,PH=H-P.t-P.b;

  [{x:P.l,y:P.t,w:PW/2,h:PH/2,lbl:'Underrated Gems',col:'rgba(40,180,80,.06)'},
   {x:P.l+PW/2,y:P.t,w:PW/2,h:PH/2,lbl:'Universally Respected',col:'rgba(60,120,220,.06)'},
   {x:P.l,y:P.t+PH/2,w:PW/2,h:PH/2,lbl:'Skip It',col:'rgba(180,30,50,.06)'},
   {x:P.l+PW/2,y:P.t+PH/2,w:PW/2,h:PH/2,lbl:'HR Checkbox',col:'rgba(180,100,20,.06)'},
  ].forEach(q=>{
    sc.appendChild(el('rect',{x:q.x,y:q.y,width:q.w,height:q.h,fill:q.col}));
    sc.appendChild(tx(q.lbl,{'text-anchor':'middle','dominant-baseline':'middle',
      x:q.x+q.w/2,y:q.y+q.h/2,fill:'#2a2d40','font-size':'9.5','font-style':'italic',
      'font-weight':'700','pointer-events':'none'}));
  });
  [1,2,3,4,5].forEach(v=>{
    const xp=P.l+(v-1)/4*PW,yp=P.t+PH-(v-1)/4*PH;
    sc.appendChild(el('line',{x1:xp,y1:P.t,x2:xp,y2:P.t+PH,stroke:'#1e2235','stroke-width':'.5','stroke-dasharray':'3 3'}));
    sc.appendChild(tx(v,{x:xp,'text-anchor':'middle',y:P.t+PH+14,fill:'#8892b0','font-size':'9','font-weight':'700'}));
    sc.appendChild(el('line',{x1:P.l,y1:yp,x2:P.l+PW,y2:yp,stroke:'#1e2235','stroke-width':'.5','stroke-dasharray':'3 3'}));
    sc.appendChild(tx(v,{x:P.l-8,'text-anchor':'end','dominant-baseline':'middle',y:yp,fill:'#8892b0','font-size':'9','font-weight':'700'}));
  });
  sc.appendChild(el('line',{x1:P.l,y1:P.t,x2:P.l,y2:P.t+PH,stroke:'#3a3f5c','stroke-width':'1.5'}));
  sc.appendChild(el('line',{x1:P.l,y1:P.t+PH,x2:P.l+PW,y2:P.t+PH,stroke:'#3a3f5c','stroke-width':'1.5'}));
  sc.appendChild(el('line',{x1:P.l+PW/2,y1:P.t,x2:P.l+PW/2,y2:P.t+PH,stroke:'#2e3455','stroke-width':'1'}));
  sc.appendChild(el('line',{x1:P.l,y1:P.t+PH/2,x2:P.l+PW,y2:P.t+PH/2,stroke:'#2e3455','stroke-width':'1'}));
  sc.appendChild(tx('HR / Employer Sentiment →',{x:P.l+PW/2,'text-anchor':'middle',y:H-8,fill:'#8892b0','font-size':'9.5','font-weight':'700'}));
  sc.appendChild(tx('Community Respect →',{x:12,'text-anchor':'middle','dominant-baseline':'middle',y:P.t+PH/2,fill:'#8892b0','font-size':'9.5','font-weight':'700',transform:`rotate(-90,12,${P.t+PH/2})`}));

  const placed=[];
  function nudge(cx,cy){
    const offs=[[9,-9],[9,9],[-9,-9],[-9,9],[14,-5],[-14,-5],[14,5],[-14,5],[0,-16],[0,16],[18,0],[-18,0],[12,-14],[-12,-14],[12,14],[-12,14]];
    for(const[ox,oy]of offs){
      const lx=cx+ox,ly=cy+oy;
      if(!placed.some(p=>Math.hypot(p.lx-lx,p.ly-ly)<20)){
        placed.push({lx,ly});return[lx,ly,ox<0?'end':'start'];
      }
    }
    const fb={lx:cx+9,ly:cy+12};placed.push(fb);return[fb.lx,fb.ly,'start'];
  }

  orgs.forEach(org=>{
    const col=ORG_COLORS[org.id]||'#888';
    const cx=P.l+(org.scores.e-1)/4*PW;
    const cy=P.t+PH-(org.scores.c-1)/4*PH;
    const[lx,ly,anchor]=nudge(cx,cy);
    const dist=Math.hypot(lx-cx,ly-cy);
    if(dist>10)sc.appendChild(el('line',{x1:cx,y1:cy,x2:lx+(anchor==='end'?5:-5),y2:ly,stroke:col,'stroke-width':'.6','stroke-opacity':'.45','pointer-events':'none'}));

    const dotG=document.createElementNS('http://www.w3.org/2000/svg','g');
    dotG.setAttribute('cursor','pointer');
    dotG.appendChild(el('circle',{cx,cy,r:'5',fill:col,'fill-opacity':'.9',stroke:'#0a0c12','stroke-width':'1'}));
    dotG.addEventListener('mouseenter',e=>showOrgTip(e,org,'scatter'));
    dotG.addEventListener('mousemove',moveTooltip);dotG.addEventListener('mouseleave',hideTooltip);
    dotG.addEventListener('click',()=>window.open(org.url,'_blank'));
    sc.appendChild(dotG);

    const labG=document.createElementNS('http://www.w3.org/2000/svg','g');
    labG.setAttribute('cursor','pointer');
    const aw=org.name.length*5.5+6;
    labG.appendChild(el('rect',{x:anchor==='end'?lx-aw:lx-3,y:ly-9,width:aw,height:12,fill:'transparent',stroke:'none'}));
    labG.appendChild(tx(org.name,{x:lx,y:ly,'text-anchor':anchor,fill:col,'font-size':'8','font-weight':'800'}));
    labG.addEventListener('mouseenter',e=>showOrgTip(e,org,'scatter'));
    labG.addEventListener('mousemove',moveTooltip);labG.addEventListener('mouseleave',hideTooltip);
    labG.addEventListener('click',()=>window.open(org.url,'_blank'));
    sc.appendChild(labG);

    const s=document.createElement('span');
    s.innerHTML=`<span class="sdot" style="background:${col}"></span>${org.name}`;
    leg.appendChild(s);
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
const tt=document.getElementById('tooltip');
function pips(n){
  return[1,2,3,4,5].map(i=>`<span class="pip" style="background:${i<=n?scoreColor(n):'#2a2d40'}"></span>`).join('');
}
function showCertTip(e,cert,dom){
  const tier=TIERS[cert.level-1];
  tt.innerHTML=`<div class="tt-ctx">${dom.short} · ${tier.name} · ${tier.years}</div>`+
    `<div class="tt-name">${cert.name}${cert.red?'<span style="display:inline-block;font-size:.52rem;font-weight:700;padding:1px 5px;border-radius:3px;background:#ff4466;color:#fff;margin-left:5px;">⚔ Offensive</span>':''}</div>`+
    `<div class="tt-sub">${cert.full}</div><div class="tt-cost">${cert.cost}</div>`+
    `<div class="tt-scores"><span class="tt-sl">Training</span><span class="tt-sv">${pips(cert.sent.t)}</span>`+
    `<span class="tt-sl">HR</span><span class="tt-sv">${pips(cert.sent.e)}</span>`+
    `<span class="tt-sl">Community</span><span class="tt-sv">${pips(cert.sent.c)}</span></div>`+
    `<div class="tt-verdict">${cert.verdict}</div>`;
  tt.classList.add('vis');moveTooltip(e);
}
function showOrgTip(e,org,axis){
  const v=axis==='training'?org.vt:axis==='scatter'?org.vc:org.ve;
  tt.innerHTML=`<div class="tt-ctx">Organization · ${axis==='training'?'Training Quality':'HR vs Community'}</div>`+
    `<div class="tt-name">${org.full}</div>`+
    `<div class="tt-scores"><span class="tt-sl">Training</span><span class="tt-sv">${pips(org.scores.t)}</span>`+
    `<span class="tt-sl">HR</span><span class="tt-sv">${pips(org.scores.e)}</span>`+
    `<span class="tt-sl">Community</span><span class="tt-sv">${pips(org.scores.c)}</span></div>`+
    `<div class="tt-verdict">${v||''}</div>`;
  tt.classList.add('vis');moveTooltip(e);
}
function moveTooltip(e){
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-310)+'px';
  tt.style.top=Math.min(e.clientY-10,window.innerHeight-220)+'px';
}
function hideTooltip(){tt.classList.remove('vis');}

// ── STATE + RENDER ────────────────────────────────────────────────────────────
let currentTab='certs',activeFilter='all';

const SKILL_LEGEND=[...TIERS].reverse().map(t=>
  `<span><span class="sw" style="background:${t.color};height:4px;"></span><strong style="color:${t.color}">${t.name}</strong> — ${t.years}</span>`
).join('');

function showPanel(tab){
  document.getElementById('wheel-wrap').style.display=tab==='certs'?'block':'none';
  document.getElementById('bar-wrap').style.display=tab==='training'?'block':'none';
  document.getElementById('scatter-wrap').style.display=tab==='scatter'?'flex':'none';
  document.getElementById('domain-filters').style.display=tab==='certs'?'flex':'none';
}

function render(animate){
  showPanel(currentTab);
  const lb=document.getElementById('legend-bar');
  const fn=document.getElementById('footnote');
  if(currentTab==='certs'){
    lb.innerHTML=SKILL_LEGEND;
    fn.textContent='Third-party/vendor-neutral certs only. ⚔ = offensive. Center = rarest. Outer = foundational. Click any cert to see details and visit site.';
    const go=()=>{
      const list=activeFilter==='all'?CERTS:CERTS.filter(c=>c.domain===activeFilter);
      placeCerts(list);
      document.querySelectorAll('.domain-bg').forEach(el2=>{
        el2.style.opacity=activeFilter==='all'?'1':el2.classList.contains('domain-bg-'+activeFilter)?'1':'0.2';
      });
    };
    if(animate){svg.querySelectorAll('.cert-node').forEach(n=>{n.style.opacity='0';});setTimeout(go,300);}
    else go();
  } else if(currentTab==='training'){
    lb.innerHTML='';fn.textContent='Organizations ranked by training quality. Hover for full assessment. Click to visit.';
    renderBars(ORGS);
  } else {
    lb.innerHTML='';fn.textContent='X = HR sentiment · Y = community respect · Top-left = underrated · Bottom-right = HR checkbox. Hover labels or dots for details.';
    renderScatter(ORGS);
  }
}

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));
    render(true);
  });
});
document.getElementById('domain-filters').addEventListener('click',e=>{
  const btn=e.target.closest('.dfbtn');if(!btn)return;
  activeFilter=btn.dataset.domain;
  document.querySelectorAll('.dfbtn').forEach(b=>b.classList.toggle('active',b===btn));
  render(true);
});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildWheel();
render(false);
</script>
